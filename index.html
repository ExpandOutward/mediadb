<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Database</title>

<!-- Bootstrap 5 CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
      rel="stylesheet" 
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
      crossorigin="anonymous"></link>

<!-- Bootstrap 5 JS Bundle (for modals, dropdowns, etc.) -->

      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
      crossorigin="anonymous"></script>

<!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body class="bg-dark text-light">
  <h1>Media Database</h1>
  <div class="container mt-5">

<!-- Movies Table -->
  <div class="card bg-dark border-secondary text-light">
  <h2>Movies</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Genre</th>
        <th>Year</th>
        <th>Actions</th>
      </tr>    
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>The Matrix</td>
        <td>Action</td>
        <td>1999</td>
        <td>
           <button>Edit</button>
           <button>Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
  </div>

<!-- Games Table -->
  <div class="card bg-dark border-secondary text-light">
  <h2>Games</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Genre</th>
        <th>Year</th>
        <th>Actions</th>
      </tr>    
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>Donkey Kong Country</td>
        <td>Action</td>
        <td>1994</td>
        <td>
           <button>Edit</button>
           <button>Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
  </div>  
  
  <!-- Shows Table -->
  <div class="card bg-dark border-secondary text-light">
  <h2>Shows</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Genre</th>
        <th>Year</th>
        <th>Actions</th>
      </tr>    
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>Tales From The Crypt</td>
        <td>Horror</td>
        <td>1989</td>
        <td>
           <button>Edit</button>
           <button>Delete</button>
        </td>
      </tr>
    </tbody>
  </table>         
  </div>

  </div>
    
</body>
</html>
