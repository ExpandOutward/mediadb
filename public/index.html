<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Top 10</title>
<!-- Bootstrap 5 CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
      rel="stylesheet" 
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
      crossorigin="anonymous"></link>
<!-- Bootstrap 5 JS Bundle (for modals, dropdowns, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
      crossorigin="anonymous"></script>
<!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css">    
</head>

<body class="bg-dark text-light">
<!-- Main Title--> 
  <h1 class="text-center mt-3">My Top 10</h1>

<!-- Auth panel (login / register) -->
  <div class="container mt-4" id="auth-panel">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card bg-dark border-secondary">
          <div class="card-body">
            <h5 class="card-title text-light mb-3">Sign in to manage your lists</h5>
            <p class="text-secondary small">Each account has its own Top 10 movies, games, and shows.</p>
            <div class="mb-3">
              <label class="form-label text-light" for="auth-email">Email</label>
              <input type="email" class="form-control bg-dark text-light border-secondary" id="auth-email" required>
            </div>
            <div class="mb-3">
              <label class="form-label text-light" for="auth-password">Password</label>
              <input type="password" class="form-control bg-dark text-light border-secondary" id="auth-password" minlength="8" required>
            </div>
            <p class="text-danger small" id="auth-error" hidden></p>
            <div class="d-flex gap-2">
              <button type="button" class="btn btn-primary" id="login-btn">Log in</button>
              <button type="button" class="btn btn-outline-light" id="register-btn">Create account</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

<!-- Primary Container (app content when logged in) -->
    <div class="container mt-5" id="app-panel" hidden>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <p class="mb-0 text-secondary" id="user-label"></p>
        <button type="button" class="btn btn-sm btn-outline-secondary" id="logout-btn">Log out</button>
      </div>

<!-- Menu -->
<!-- LEARNED: <role> is an ARIA role. ARIA is an accessibility standard used primarily for screen readers. -->
<!-- LEARNED: <datab-bs-toggle> and <data-bs-target> are Bootstrap5 elements implmenting both CSS and JS -->
      <ul class="nav nav-tabs nav-fill mb-4" id="mediaTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active bg-dark text-light border-secondary" 
            id="movies-tab" 
            data-bs-toggle="tab" 
            data-bs-target="#movies"
            type="button" 
            role="tab"> 
            Movies
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link bg-dark text-light border-secondary" 
            id="games-tab" 
            data-bs-toggle="tab" 
            data-bs-target="#games" 
            type="button" 
            role="tab">
            Games
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link bg-dark text-light border-secondary" 
            id="shows-tab" 
            data-bs-toggle="tab" 
            data-bs-target="#shows" 
            type="button" 
            role="tab">
            Shows
          </button>
        </li>
      </ul>
<!-- Tab Content -->
    <div class="tab-content" id="mediaTabContent">

<!-- Media Section | Titles, Forms, Tables -->

<!-- Movie Section -->
    <div class="tab-pane fade show active" id="movies" role="tabpanel">
      <h3>Movies</h3>
      <div class="card bg-dark border-secondary mb-4">
        <div class="card-header">
          <h5 class="mb-0 text-light">Add New Movie</h5>
        </div>
        <div class="card-body">
          <form id="add-movie-form">
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label text-light">Title</label>
                <input type="text" class="form-control bg-dark text-light border-secondary" id="movie-title" required>
              </div>
              <div class="col-md-3">
                <label class="form-label text-light">Genre</label>
                <input type="text" class="form-control bg-dark text-light border-secondary" id="movie-genre" required>
              </div>
              <div class="col-md-2">
                <label class="form-label text-light">Year</label>
                <input type="number" class="form-control bg-dark text-light border-secondary" id="movie-year" required>
              </div>
              <div class="col-md-3 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">Add Movie</button>
              </div>
            </div>
          </form>
        </div>
      </div>
      <table class="table table-dark table-striped table-hover">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Title</th>
            <th>Genre</th>
            <th>Year</th>
            <th>Actions</th>
          </tr>    
        </thead>
        <tbody id="movies-table-body">
          <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td>
              <button class="btn btn-sm btn-primary">Edit</button>
              <button class="btn btn-sm btn-danger">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

<!-- Game Section -->
  <div class="tab-pane fade" id="games" role="tabpanel">
    <h3>Games</h3>
    <div class="card bg-dark border-secondary mb-4">
      <div class="card-header">
        <h5 class="mb-0 text-light">Add New Game</h5>
      </div>
      <div class="card-body">
        <form id="add-game-form">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label text-light">Title</label>
              <input type="text" class="form-control bg-dark text-light border-secondary" id="game-title" required>
            </div>
            <div class="col-md-3">
              <label class="form-label text-light">Genre</label>
              <input type="text" class="form-control bg-dark text-light border-secondary" id="game-genre" required>
            </div>
            <div class="col-md-2">
              <label class="form-label text-light">Year</label>
              <input type="number" class="form-control bg-dark text-light border-secondary" id="game-year" required>
            </div>
            <div class="col-md-3 d-flex align-items-end">
              <button type="submit" class="btn btn-success w-100">Add Game</button>
            </div>
          </div>
        </form>
      </div>
    </div>
    <table class="table table-dark table-striped table-hover">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Title</th>
          <th>Genre</th>
          <th>Year</th>
          <th>Actions</th>
        </tr>    
      </thead>
      <tbody id="games-table-body">
        <tr>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td>
            <button class="btn btn-sm btn-primary">Edit</button>
            <button class="btn btn-sm btn-danger">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Show Section -->
  <div class="tab-pane fade" id="shows" role="tabpanel">
    <h3>Shows</h3>
      <table class="table table-dark table-striped table-hover">
        <div class="card bg-dark border-secondary mb-4">
          <div class="card-header">
            <h5 class="mb-0 text-light">Add New Show</h5>
          </div>
          <div class="card-body">
            <form id="add-show-form">
              <div class="row g-3">
                <div class="col-md-4">
                  <label class="form-label text-light">Title</label>
                  <input type="text" mind="1500" class="form-control bg-dark text-light border-secondary" id="show-title" required>
                </div>
                <div class="col-md-3">
                  <label class="form-label text-light">Genre</label>
                  <input type="text" min="1500" class="form-control bg-dark text-light border-secondary" id="show-genre" required>
                </div>
                <div class="col-md-2">
                  <label class="form-label text-light">Year</label>
                  <input type="number" min="1500" class="form-control bg-dark text-light border-secondary" id="show-year" required>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">Add Show</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Title</th>
          <th>Genre</th>
          <th>Year</th>
          <th>Actions</th>
        </tr>    
      </thead>
      <tbody id="shows-table-body">
        <tr>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td>
            <button class="btn btn-sm btn-primary">Edit</button>
            <button class="btn btn-sm btn-danger">Delete</button>
          </td>
        </tr>
      </tbody>
    </table> 
  </div>
</div>
</div><!-- /app-panel -->

<!-- Edit Movie Modal -->
<div class="modal fade" id="editMovieModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-light">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Edit Movie</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="edit-movie-form">
          <input type="hidden" id="edit-movie-id">
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" class="form-control bg-dark text-light border-secondary" id="edit-movie-title" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Genre</label>
            <input type="text" class="form-control bg-dark text-light border-secondary" id="edit-movie-genre" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Year</label>
            <input type="number" class="form-control bg-dark text-light border-secondary" id="edit-movie-year" required>
          </div>
        </form>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="save-movie-edit">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<!-- LEARNED: Edit modals are created dynamically from JS, so adding min values here will not work. -->
<!-- LEARNED: Must add the min restrictions to app.js.-->

<!-- Edit Game Modal -->
<div class="modal fade" id="editGameModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-light">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Edit Game</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="edit-game-form">
          <input type="hidden" id="edit-game-id">
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" class="form-control bg-dark text-light border-secondary" id="edit-game-title" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Genre</label>
            <input type="text" class="form-control bg-dark text-light border-secondary" id="edit-game-genre" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Year</label>
            <input type="number" class="form-control bg-dark text-light border-secondary" id="edit-game-year" required>
          </div>
        </form>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="save-game-edit">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<!-- Edit Show Modal -->
<div class="modal fade" id="editShowModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-light">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Edit Show</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="edit-show-form">
          <input type="hidden" id="edit-show-id">
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" class="form-control bg-dark text-light border-secondary" id="edit-show-title" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Genre</label>
            <input type="text" class="form-control bg-dark text-light border-secondary" id="edit-show-genre" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Year</label>
            <input type="number" class="form-control bg-dark text-light border-secondary" id="edit-show-year" required>
          </div>
        </form>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="save-show-edit">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>

</body>
</html>
